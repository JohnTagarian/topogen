<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Network Topology Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Kanit', 'sans-serif'],
          },
          backgroundImage: {
            'gradient-primary': 'linear-gradient(135deg, #06b6d4, #3b82f6)',
          }
        }
      }
    }
  </script>
  <style>
    .text-gradient {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .textarea-glow:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2), 0 0 0 1px #06b6d4;
    }
    .btn-gradient {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-gradient:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
    }
    .btn-gradient:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-gradient:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center py-12 px-4">

  <!-- Background decoration -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-cyan-100 rounded-full opacity-40 blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-blue-100 rounded-full opacity-40 blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-3xl">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white shadow-md mb-4">
        <svg class="w-9 h-9" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="19" stroke="url(#hg)" stroke-width="2"/>
          <circle cx="20" cy="9" r="3.5" fill="url(#hg)"/>
          <circle cx="9" cy="28" r="3.5" fill="url(#hg)"/>
          <circle cx="31" cy="28" r="3.5" fill="url(#hg)"/>
          <circle cx="20" cy="20" r="4" fill="url(#hg)"/>
          <line x1="20" y1="12.5" x2="20" y2="16" stroke="#06b6d4" stroke-width="1.5"/>
          <line x1="17.2" y1="21.8" x2="11" y2="25" stroke="#3b82f6" stroke-width="1.5"/>
          <line x1="22.8" y1="21.8" x2="29" y2="25" stroke="#3b82f6" stroke-width="1.5"/>
          <defs>
            <linearGradient id="hg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#06b6d4"/>
              <stop offset="1" stop-color="#3b82f6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-slate-800 tracking-tight">
        <span class="text-gradient">AI</span> Network Topology Generator
      </h1>
      <p class="mt-2 text-slate-500 text-sm">อธิบายความต้องการเครือข่ายของคุณเป็นภาษาธรรมชาติ แล้วให้ AI ออกแบบโทโพโลยีและ BOM ให้โดยอัตโนมัติ</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">

      {% if error %}
      <div class="flex items-start gap-3 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 mb-6 text-sm">
        <svg class="w-5 h-5 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/generate" id="main-form">

        <!-- Example prompts -->
        <div class="mb-5">
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">ตัวอย่าง — คลิกเพื่อใช้งาน</p>
          <div class="flex flex-wrap gap-2">
            <button type="button" class="pill-btn text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 bg-slate-50 hover:border-cyan-400 hover:text-cyan-600 hover:bg-cyan-50 transition-all duration-150 cursor-pointer">
              ออฟฟิศ 3 ชั้น ชั้นละ 30 คน มี Server Room ต้องการ WiFi ทุกชั้น
            </button>
            <button type="button" class="pill-btn text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 bg-slate-50 hover:border-cyan-400 hover:text-cyan-600 hover:bg-cyan-50 transition-all duration-150 cursor-pointer">
              โรงเรียน 200 คน ต้องการ internet และ file server
            </button>
            <button type="button" class="pill-btn text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 bg-slate-50 hover:border-cyan-400 hover:text-cyan-600 hover:bg-cyan-50 transition-all duration-150 cursor-pointer">
              โรงงาน 3 อาคาร พนักงาน 100 คน ต้องการ VoIP และ CCTV
            </button>
            <button type="button" class="pill-btn text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-600 bg-slate-50 hover:border-cyan-400 hover:text-cyan-600 hover:bg-cyan-50 transition-all duration-150 cursor-pointer">
              Small office 10 users, need internet and WiFi, budget 50000 THB
            </button>
          </div>
        </div>

        <!-- Textarea -->
        <div class="relative mb-5">
          <label for="user_input" class="block text-sm font-medium text-slate-700 mb-2">
            Network Requirements
          </label>
          <textarea
            name="user_input"
            id="user_input"
            rows="5"
            placeholder="พิมพ์ความต้องการเครือข่ายของคุณที่นี่ (ภาษาไทยหรืออังกฤษ)&#10;เช่น: ออฟฟิศ 2 ชั้น พนักงาน 50 คน ต้องการ WiFi และ internet"
            required
            class="textarea-glow w-full px-4 py-3 text-sm text-slate-700 bg-slate-50 border border-slate-200 rounded-xl resize-none placeholder-slate-400 transition-colors duration-150 hover:border-slate-300"
          ></textarea>
          <!-- Clear button -->
          <button
            type="button"
            id="clear-btn"
            class="absolute top-9 right-3 p-1 text-slate-300 hover:text-slate-500 transition-colors duration-150 hidden"
            title="Clear text"
            aria-label="Clear textarea"
          >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- Submit button -->
        <button type="submit" id="submit-btn" class="btn-gradient w-full py-3.5 rounded-xl text-white font-semibold text-base flex items-center justify-center gap-2.5 shadow-md shadow-cyan-200/50">
          <span id="btn-icon">✨</span>
          <span id="btn-text">Generate Topology</span>
          <!-- Loading spinner (hidden by default) -->
          <svg id="btn-spinner" class="hidden w-5 h-5 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
          </svg>
        </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-slate-400 mt-6">
      Powered by DeepSeek &amp; Flask · Network topology auto-design
    </p>
  </div>

  <script>
    const textarea = document.getElementById('user_input');
    const clearBtn = document.getElementById('clear-btn');
    const form     = document.getElementById('main-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnIcon  = document.getElementById('btn-icon');
    const btnText  = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    // Show/hide clear button
    function updateClearBtn() {
      clearBtn.classList.toggle('hidden', textarea.value.trim() === '');
    }
    textarea.addEventListener('input', updateClearBtn);

    // Clear textarea
    clearBtn.addEventListener('click', function () {
      textarea.value = '';
      textarea.focus();
      updateClearBtn();
    });

    // Pill example prompts
    document.querySelectorAll('.pill-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        textarea.value = btn.textContent.trim();
        textarea.focus();
        updateClearBtn();
      });
    });

    // Loading state on submit
    form.addEventListener('submit', function () {
      submitBtn.disabled = true;
      btnIcon.classList.add('hidden');
      btnSpinner.classList.remove('hidden');
      btnText.textContent = 'Generating Topology… Please wait';
    });
  </script>

</body>
</html>
